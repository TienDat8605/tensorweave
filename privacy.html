<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TensorWeave | Privacy Policy</title>
    <style>
      :root {
        --bg: #f7fafc;
        --surface: #ffffff;
        --text: #1a1a1a;
        --muted: #4a5568;
        --accent: #667eea;
        --border: #e2e8f0;
        --shadow: 0 10px 30px rgba(26, 26, 26, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --surface: #111b31;
          --text: #e5e7eb;
          --muted: #a7b0c0;
          --accent: #7a8ef0;
          --border: #25304a;
          --shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(
          180deg,
          var(--bg),
          color-mix(in srgb, var(--bg) 88%, #dbeafe 12%)
        );
        color: var(--text);
        line-height: 1.65;
      }

      .container {
        width: min(900px, 92vw);
        margin: 0 auto;
        padding: 3rem 0;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.5rem;
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0 0 0.4rem;
        font-size: clamp(1.8rem, 4vw, 2.3rem);
      }

      p,
      li {
        color: var(--muted);
      }

      ul {
        margin: 1rem 0 0;
        padding-left: 1.2rem;
      }

      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }

      a:hover {
        text-decoration: underline;
      }

      footer {
        margin-top: 1.5rem;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <article class="card">
        <h1>Privacy Policy</h1>
        <p>TensorWeave is built for privacy-first research workflows.</p>
        <ul>
          <li>No data collection or storage.</li>
          <li>No user tracking.</li>
          <li>Real-time arXiv API usage only.</li>
          <li>No sharing with third parties.</li>
        </ul>
        <p><a href="./index.html">Back to home</a></p>
      </article>
      <footer>
        <p>Copyright 2024 TensorWeave</p>
      </footer>
    </main>
  </body>
</html>
